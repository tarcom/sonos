<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonos Master Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            overflow-y: auto;
            max-height: 100vh;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            margin-left: 10px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .button-grid.half {
            grid-template-columns: repeat(2, 1fr);
        }

        .button-grid.full {
            grid-template-columns: 1fr;
        }

        button {
            padding: 16px 12px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 70px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Room selection buttons */
        .btn-room {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-room:hover:not(:disabled) {
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-room.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 5px 25px rgba(245, 87, 108, 0.5);
        }

        /* Source buttons */
        .btn-source {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-source:hover:not(:disabled) {
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
        }

        .btn-source.active {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            box-shadow: 0 5px 25px rgba(250, 112, 154, 0.5);
        }

        /* Media control buttons */
        .btn-media {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            font-size: 12px;
        }

        .btn-media:hover:not(:disabled) {
            box-shadow: 0 5px 20px rgba(168, 237, 234, 0.4);
        }

        /* Action buttons */
        .btn-action {
            background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);
            color: white;
            font-size: 12px;
        }

        .btn-action:hover:not(:disabled) {
            box-shadow: 0 5px 20px rgba(255, 154, 86, 0.4);
        }

        /* Volume buttons */
        .btn-volume {
            background: linear-gradient(135deg, #76b852 0%, #8dc26f 100%);
            color: white;
            font-size: 13px;
            min-height: 60px;
        }

        .btn-volume:hover:not(:disabled) {
            box-shadow: 0 5px 20px rgba(118, 184, 82, 0.4);
        }

        /* Icon styling */
        .icon {
            font-size: 22px;
            line-height: 1;
        }

        .status-display {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .status-row:last-child {
            margin-bottom: 0;
        }

        .status-label {
            color: #666;
            font-weight: 500;
        }

        .status-value {
            color: #333;
            font-weight: 600;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #ddd;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .divider {
            height: 1px;
            background: #eee;
            margin: 15px 0;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
                border-radius: 15px;
            }

            h1 {
                font-size: 20px;
            }

            .section-title {
                font-size: 12px;
            }

            button {
                padding: 14px 10px;
                font-size: 12px;
                min-height: 65px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔊 Sonos Control</h1>

        <div class="status-display">
            <div class="status-row">
                <span class="status-label">Rum:</span>
                <span class="status-value" id="roomStatus">-</span>
            </div>
            <div class="status-row">
                <span class="status-label">Kilde:</span>
                <span class="status-value" id="sourceStatus">-</span>
            </div>
        </div>

        <!-- Room Selection -->
        <div class="section">
            <div class="section-title">Vælg Rum</div>
            <div class="button-grid">
                <button class="btn-room" onclick="callScript('script.vaelg_kokken')" id="btnKokken">
                    <span class="icon">👨‍🍳</span>
                    <span>Køkken</span>
                </button>
                <button class="btn-room" onclick="callScript('script.vaelg_kontor')" id="btnKontor">
                    <span class="icon">🖥️</span>
                    <span>Kontor</span>
                </button>
                <button class="btn-room" onclick="callScript('script.vaelg_begge')" id="btnBegge">
                    <span class="icon">🏠</span>
                    <span>Begge</span>
                </button>
            </div>
        </div>

        <!-- Source Selection -->
        <div class="section">
            <div class="section-title">Vælg Kilde</div>
            <div class="button-grid">
                <button class="btn-source" onclick="callScript('script.spil_p4')" id="btnP4">
                    <span class="icon">📻</span>
                    <span>DR P4</span>
                </button>
                <button class="btn-source" onclick="callScript('script.spil_yt')" id="btnYT">
                    <span class="icon">▶️</span>
                    <span>YT</span>
                </button>
                <button class="btn-source" onclick="callScript('script.spil_linein')" id="btnLinein">
                    <span class="icon">🔌</span>
                    <span>Line-in</span>
                </button>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Playback Controls -->
        <div class="section">
            <div class="section-title">Afspilning</div>
            <div class="button-grid half">
                <button class="btn-media" onclick="callService('media_player', 'media_play_pause', ['media_player.unnamed_room_2', 'media_player.kontor'])">
                    <span class="icon">▶️ ⏸️</span>
                    <span>Play/Pause</span>
                </button>
                <button class="btn-media" onclick="callService('media_player', 'media_stop', ['media_player.unnamed_room_2', 'media_player.kontor'])">
                    <span class="icon">⏹️</span>
                    <span>Stop</span>
                </button>
            </div>
            <div class="button-grid half">
                <button class="btn-media" onclick="callService('media_player', 'media_next_track', ['media_player.unnamed_room_2', 'media_player.kontor'])">
                    <span class="icon">⏭️</span>
                    <span>Næste</span>
                </button>
                <button class="btn-media" onclick="callService('media_player', 'media_previous_track', ['media_player.unnamed_room_2', 'media_player.kontor'])">
                    <span class="icon">⏮️</span>
                    <span>Forrige</span>
                </button>
            </div>
            <div class="button-grid half">
                <button class="btn-media" onclick="callService('media_player', 'shuffle_set', ['media_player.unnamed_room_2', 'media_player.kontor'], true)">
                    <span class="icon">🔀</span>
                    <span>Shuffle ON</span>
                </button>
                <button class="btn-media" onclick="callService('media_player', 'shuffle_set', ['media_player.unnamed_room_2', 'media_player.kontor'], false)">
                    <span class="icon">🔁</span>
                    <span>Shuffle OFF</span>
                </button>
            </div>
        </div>

        <!-- Volume Controls -->
        <div class="section">
            <div class="section-title">Lydstyrke</div>
            <div class="button-grid half">
                <button class="btn-volume" onclick="callService('media_player', 'volume_set', ['media_player.unnamed_room_2', 'media_player.kontor'], 0.10)">
                    <span class="icon">🔇</span>
                    <span>Stille (10%)</span>
                </button>
                <button class="btn-volume" onclick="callService('media_player', 'volume_set', ['media_player.unnamed_room_2', 'media_player.kontor'], 0.20)">
                    <span class="icon">🔉</span>
                    <span>Lav (20%)</span>
                </button>
            </div>
            <div class="button-grid half">
                <button class="btn-volume" onclick="callService('media_player', 'volume_set', ['media_player.unnamed_room_2', 'media_player.kontor'], 0.30)">
                    <span class="icon">🔊</span>
                    <span>Mellem (30%)</span>
                </button>
                <button class="btn-volume" onclick="callScript('script.balance_volumen')">
                    <span class="icon">⚖️</span>
                    <span>Balancér</span>
                </button>
            </div>
            <div class="button-grid full">
                <button class="btn-action" onclick="callScript('script.afbalancer_volumen')">
                    <span class="icon">🟰</span>
                    <span>Afbalancér (Lige volumen)</span>
                </button>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Emergency Controls -->
        <div class="section">
            <div class="button-grid half">
                <button class="btn-action" onclick="callService('media_player', 'media_pause', ['media_player.unnamed_room_2', 'media_player.kontor'])">
                    <span class="icon">⏸️</span>
                    <span>Pause ALT</span>
                </button>
                <button class="btn-action" style="background: linear-gradient(135deg, #ff4757 0%, #c92a2a 100%);" onclick="callService('media_player', 'media_stop', ['media_player.unnamed_room_2', 'media_player.kontor'])">
                    <span class="icon">🛑</span>
                    <span>STOP ALT</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const HA_URL = 'http://192.168.1.85:8123';
        // Hardcoded token - no setup needed
        let TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJlOWM5NWQ4MGRiMTY0NzVjYWVhOTk1MjdiNmI4ODQ1OSIsImlhdCI6MTc3NDM4NTUyNCwiZXhwIjoyMDg5NzQ1NTI0fQ.95R2H3Lu3891cbAifRROgnUoquTQhZbUhPHHUqcMGus';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateStatus();
            setInterval(updateStatus, 5000); // Update status every 5 seconds
        });

        async function updateStatus() {
            try {
                // Get sonos_rum state
                const rumResponse = await fetch(
                    `${HA_URL}/api/states/input_select.sonos_rum`,
                    { headers: { 'Authorization': `Bearer ${TOKEN}` } }
                );
                if (rumResponse.ok) {
                    const rumData = await rumResponse.json();
                    const rumState = rumData.state;
                    document.getElementById('roomStatus').textContent = rumState;

                    // Update active button
                    document.querySelectorAll('.btn-room').forEach(btn => btn.classList.remove('active'));
                    if (rumState === 'Køkken') document.getElementById('btnKokken').classList.add('active');
                    if (rumState === 'Kontor') document.getElementById('btnKontor').classList.add('active');
                    if (rumState === 'Begge') document.getElementById('btnBegge').classList.add('active');
                } else if (rumResponse.status === 401) {
                    resetToken();
                }

                // Get sonos_kilde state
                const kildeResponse = await fetch(
                    `${HA_URL}/api/states/input_select.sonos_kilde`,
                    { headers: { 'Authorization': `Bearer ${TOKEN}` } }
                );
                if (kildeResponse.ok) {
                    const kildeData = await kildeResponse.json();
                    const kildeState = kildeData.state;
                    document.getElementById('sourceStatus').textContent = kildeState;

                    // Update active button
                    document.querySelectorAll('.btn-source').forEach(btn => btn.classList.remove('active'));
                    if (kildeState === 'P4') document.getElementById('btnP4').classList.add('active');
                    if (kildeState === 'YT') document.getElementById('btnYT').classList.add('active');
                    if (kildeState === 'Line-in') document.getElementById('btnLinein').classList.add('active');
                } else if (kildeResponse.status === 401) {
                    resetToken();
                }
            } catch (error) {
                console.log('Status update failed:', error);
            }
        }

        async function callScript(scriptName) {
            try {
                const response = await fetch(`${HA_URL}/api/services/script/${scriptName.split('.')[1]}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                });

                if (response.ok) {
                    console.log(`Script ${scriptName} executed`);
                    setTimeout(updateStatus, 1000); // Update status after script execution
                } else if (response.status === 401) {
                    resetToken();
                } else {
                    console.error(`Failed to execute script: ${response.status}`);
                    alert(`Fejl: ${response.status}`);
                }
            } catch (error) {
                console.error('Error calling script:', error);
                alert('Fejl ved kontakt til Home Assistant');
            }
        }

        async function callService(domain, service, entityIds, extraData = null) {
            try {
                const data = {
                    entity_id: entityIds
                };

                if (service === 'volume_set') {
                    data.volume_level = extraData;
                } else if (service === 'shuffle_set') {
                    data.shuffle = extraData;
                }

                const response = await fetch(`${HA_URL}/api/services/${domain}/${service}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    console.log(`Service ${domain}.${service} executed`);
                } else if (response.status === 401) {
                    resetToken();
                } else {
                    console.error(`Failed to execute service: ${response.status}`);
                    alert(`Fejl: ${response.status}`);
                }
            } catch (error) {
                console.error('Error calling service:', error);
                alert('Fejl ved kontakt til Home Assistant');
            }
        }

        // Reset token function for if it becomes invalid
        function resetToken() {
            alert('Der er et autentificeringsproblem. Kontakt systemadministratoren.');
        }
    </script>
</body>
</html>
